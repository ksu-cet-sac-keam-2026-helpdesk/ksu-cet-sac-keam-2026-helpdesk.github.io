<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KSU Student Assist Cell 2026 – KEAM Resource Hub</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --blue: #1565C0;
      --blue-dark: #0D47A1;
      --blue-deeper: #0A2E6E;
      --blue-mid: #1976D2;
      --blue-bright: #2196F3;
      --blue-light: #BBDEFB;
      --blue-xlight: #E3F2FD;
      --cyan: #00B0FF;
      --black: #080C14;
      --surface: #0E1520;
      --surface2: #131D2E;
      --surface3: #192338;
      --border: rgba(33, 150, 243, 0.18);
      --border-strong: rgba(33, 150, 243, 0.35);
      --text: #E8F0FE;
      --text-muted: #7B9CC8;
      --text-dim: #4A6FA0;
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.6);
      --shadow-blue: 0 4px 20px rgba(21, 101, 192, 0.3);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--black);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      background: rgba(8, 12, 20, 0.97);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      box-shadow: 0 2px 24px rgba(0, 0, 0, 0.5);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      gap: 1.5rem;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--blue-bright));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: -0.5px;
      box-shadow: 0 0 16px rgba(33, 150, 243, 0.4);
    }

    .nav-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      line-height: 1.2;
    }

    .nav-title span {
      display: block;
      font-weight: 400;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      gap: 0.25rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }

    .nav-links a:hover {
      background: rgba(33, 150, 243, 0.12);
      color: var(--text);
    }

    .nav-links a.active {
      background: rgba(33, 150, 243, 0.18);
      color: var(--blue-bright);
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text-muted);
      margin: 4px 0;
      border-radius: 2px;
      transition: 0.3s;
    }

    /* HERO */
    .hero {
      background: var(--black);
      color: white;
      text-align: center;
      padding: 80px 2rem 88px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(21, 101, 192, 0.45) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 20% 110%, rgba(13, 71, 161, 0.3) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 110%, rgba(0, 176, 255, 0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Ccircle cx='40' cy='40' r='1' fill='%232196F3' fill-opacity='0.08'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .hero-badge {
      display: inline-block;
      position: relative;
      z-index: 1;
      background: rgba(33, 150, 243, 0.12);
      border: 1px solid rgba(33, 150, 243, 0.35);
      color: var(--blue-bright);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
      color: #fff;
    }

    .hero h1 span {
      color: var(--cyan);
    }

    .hero p {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 540px;
      margin: 0 auto 32px;
      font-weight: 300;
      position: relative;
      z-index: 1;
    }

    .hero-ctas {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .btn-hero {
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      box-shadow: var(--shadow-blue);
    }

    .btn-primary:hover {
      background: var(--blue-mid);
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(21, 101, 192, 0.45);
    }

    .btn-outline {
      border-color: rgba(33, 150, 243, 0.4);
      color: var(--blue-bright);
    }

    .btn-outline:hover {
      background: rgba(33, 150, 243, 0.1);
      border-color: var(--blue-bright);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 52px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 800;
      color: var(--cyan);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* SECTION */
    .section {
      padding: 56px 2rem;
    }

    .section-alt {
      background: var(--surface);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(33, 150, 243, 0.12);
      color: var(--blue-bright);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
      border: 1px solid rgba(33, 150, 243, 0.25);
    }

    .section-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(22px, 3.5vw, 34px);
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
    }

    .section-header p {
      color: var(--text-muted);
      font-size: 15px;
      max-width: 520px;
      margin: 0 auto;
    }

    /* GRIDS */
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* CATEGORY CARDS */
    .cat-card {
      background: var(--surface2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .cat-card:hover {
      box-shadow: var(--shadow-blue);
      transform: translateY(-3px);
      border-color: var(--border-strong);
    }

    .cat-card-header {
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
    }

    .cat-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .cat-icon.red {
      background: rgba(33, 150, 243, 0.15);
    }

    .cat-icon.gold {
      background: rgba(0, 176, 255, 0.12);
    }

    .cat-icon.blue {
      background: rgba(33, 150, 243, 0.15);
    }

    .cat-icon.green {
      background: rgba(0, 176, 255, 0.12);
    }

    .cat-card-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .cat-card-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .cat-card-body {
      padding: 16px 20px;
    }

    .file-list {
      list-style: none;
    }

    .file-list li {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13.5px;
      color: var(--text-muted);
    }

    .file-list li:last-child {
      border-bottom: none;
    }

    .file-list li a {
      color: var(--blue-bright);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .file-list li a:hover {
      color: var(--cyan);
      text-decoration: underline;
    }

    .file-icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    .badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 2px 7px;
      border-radius: 10px;
      text-transform: uppercase;
    }

    .badge-new {
      background: rgba(0, 176, 255, 0.15);
      color: var(--cyan);
      border: 1px solid rgba(0, 176, 255, 0.3);
    }

    .badge-pyq {
      background: rgba(33, 150, 243, 0.15);
      color: var(--blue-bright);
      border: 1px solid var(--border-strong);
    }

    .badge-ref {
      background: rgba(33, 150, 243, 0.1);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* TABS */
    .tab-wrap {
      background: var(--surface2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .tab-header {
      display: flex;
      background: var(--surface3);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .tab-btn {
      padding: 14px 20px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }

    .tab-btn.active {
      color: var(--blue-bright);
      border-bottom-color: var(--blue-bright);
      background: var(--surface2);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text);
      background: rgba(33, 150, 243, 0.06);
    }

    .tab-content {
      display: none;
      padding: 24px;
    }

    .tab-content.active {
      display: block;
    }

    /* FILE ROWS */
    .file-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      border: 1px solid var(--border);
      margin-bottom: 0;
      transition: box-shadow 0.15s, border-color 0.15s;
      gap: 14px;
      flex-wrap: wrap;
    }

    .file-row:hover {
      box-shadow: var(--shadow-blue);
      border-color: var(--border-strong);
    }

    .file-row-icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: rgba(33, 150, 243, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .file-row-icon:hover {
      background: rgba(33, 150, 243, 0.25);
      box-shadow: 0 0 12px rgba(33, 150, 243, 0.4);
    }

    .file-row-info {
      flex: 1;
      min-width: 0;
    }

    .file-row-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-row-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .btn-download {
      padding: 7px 16px;
      background: var(--blue);
      color: white;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      flex-shrink: 0;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(21, 101, 192, 0.35);
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-download:hover {
      background: var(--blue-mid);
      box-shadow: 0 4px 16px rgba(21, 101, 192, 0.5);
    }

    .btn-preview {
      background: rgba(33, 150, 243, 0.12) !important;
      color: var(--blue-bright) !important;
      border: 1px solid rgba(33, 150, 243, 0.4) !important;
      box-shadow: none !important;
    }

    .btn-preview:hover {
      background: rgba(33, 150, 243, 0.25) !important;
      border-color: var(--blue-bright) !important;
      box-shadow: 0 0 12px rgba(33, 150, 243, 0.35) !important;
    }

    /* Mobile file-row: buttons stack below on small screens */
    @media (max-width: 600px) {
      .file-row {
        flex-wrap: wrap;
        row-gap: 10px;
      }

      .file-row-info {
        /* Take full width minus icon so name has room */
        flex-basis: calc(100% - 56px);
      }

      .file-row .badge {
        margin-left: auto;
      }

      .btn-download {
        /* Push button to full row below */
        width: 100%;
        justify-content: center;
        padding: 9px 16px;
        font-size: 14px;
      }
    }

    /* PDF VIEWER MODAL */
    #pdf-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(6px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #pdf-modal.open {
      display: flex;
    }

    .pdf-modal-header {
      width: 100%;
      max-width: 960px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface3);
      border-bottom: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .pdf-modal-title {
      flex: 1;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pdf-modal-close {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 18px;
      line-height: 1;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .pdf-modal-close:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .pdf-modal-dl {
      padding: 7px 18px;
      background: var(--blue);
      color: white;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(21, 101, 192, 0.4);
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      border: 1px solid rgba(255, 255, 255, 0.15);
      animation: dlPulse 2.5s ease-in-out 1.2s 2;
    }

    .pdf-modal-dl:hover {
      background: var(--blue-mid);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(21, 101, 192, 0.55);
    }

    @keyframes dlPulse {

      0%,
      100% {
        box-shadow: 0 2px 8px rgba(21, 101, 192, 0.4);
      }

      50% {
        box-shadow: 0 0 0 4px rgba(33, 150, 243, 0.3), 0 2px 8px rgba(21, 101, 192, 0.4);
      }
    }

    .pdf-modal-body {
      width: 100%;
      max-width: 960px;
      flex: 1;
      background: #1a1a2e;
      border-radius: 0 0 var(--radius) var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #pdf-frame {
      width: 100%;
      flex: 1;
      border: none;
      background: #fff;
    }

    .pdf-modal-loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
      gap: 10px;
    }

    @media (max-width: 600px) {
      .pdf-modal-header {
        border-radius: 0;
      }

      .pdf-modal-body {
        border-radius: 0;
      }

      #pdf-modal {
        align-items: stretch;
        justify-content: flex-start;
      }

      #pdf-modal.open {
        display: flex;
        flex-direction: column;
      }
    }

    /* NOTICE */
    .notice {
      background: rgba(33, 150, 243, 0.08);
      border: 1px solid rgba(33, 150, 243, 0.25);
      border-left: 3px solid var(--blue-bright);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--text-muted);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .notice strong {
      color: var(--blue-bright);
    }

    /* FOOTER */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      padding: 48px 2rem 28px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 40px;
      margin-bottom: 36px;
    }

    .footer-brand .logo-circle {
      margin-bottom: 14px;
    }

    .footer-brand p {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.7;
      margin-top: 10px;
    }

    .footer-col h4 {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .footer-col a {
      display: block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13.5px;
      margin-bottom: 8px;
      transition: color 0.15s;
    }

    .footer-col a:hover {
      color: var(--blue-bright);
    }

    .footer-bottom {
      border-top: 1px solid var(--border);
      padding-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12.5px;
      color: var(--text-dim);
    }

    /* CONTACT */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    .contact-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
      transition: border-color 0.15s;
    }

    .contact-card:hover {
      border-color: var(--border-strong);
    }

    .contact-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(33, 150, 243, 0.15);
      color: var(--blue-bright);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      margin: 0 auto 10px;
      border: 1px solid var(--border-strong);
    }

    .contact-name {
      font-weight: 600;
      font-size: 13px;

  <style>
    /* ── SMOOTH SCROLL ── */
    html {
      scroll-behavior: smooth;
    }

    /* ── PAGE FADE IN ── */
    #page-content {
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    #page-content.visible {
      opacity: 1;
    }

    /* ══════════════════════════════════
   LOADER
══════════════════════════════════ */
    #ksu-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #080C14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #ksu-loader.fade-out {
      animation: loaderOut 1.1s ease forwards;
      pointer-events: none;
    }

    @keyframes loaderOut {
      to {
        opacity: 0;
        transform: scale(1.04);
      }
    }

    /* Particle canvas */
    #loader-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Logo row */
    .ld-logos {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 32px;
    }

    .ld-logo {
      width: 220px;
      height: 220px;
      object-fit: contain;
      opacity: 0;
      filter: brightness(0) invert(1);
      transition: filter 1.8s ease;
    }

    .ld-logo.sac {
      width: 360px;
      height: 360px;
      animation: ldSlideRight 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
    }

    .ld-logo.ksu {
      animation: ldSlideLeft 1.1s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
    }

    .ld-logo.colored {
      filter: drop-shadow(0 0 22px rgba(33, 150, 243, 0.7)) brightness(1.1);
    }

    @keyframes ldSlideRight {
      from {
        opacity: 0;
        transform: translateX(-60px) scale(0.8);
      }

      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes ldSlideLeft {
      from {
        opacity: 0;
        transform: translateX(60px) scale(0.8);
      }

      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    /* Glowing divider between logos */
    .ld-divider {
      width: 2px;
      height: 0;
      background: linear-gradient(to bottom,
          transparent,
          rgba(33, 150, 243, 0.9),
          rgba(0, 176, 255, 0.9),
          transparent);
      margin: 0 24px 0 -50px;
      opacity: 0;
      animation: ldDivider 0.8s ease 1.8s forwards;
      box-shadow: 0 0 12px rgba(33, 150, 243, 0.6);
      flex-shrink: 0;
    }

    @keyframes ldDivider {
      to {
        height: 140px;
        opacity: 1;
      }
    }

    /* Pulse ring around logos */
    .ld-ring {
      position: absolute;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      border: 2px solid rgba(33, 150, 243, 0.0);
      pointer-events: none;
      opacity: 0;
    }

    .ld-ring.active {
      animation: ldRingPulse 2.2s ease-out 2.2s infinite;
    }

    @keyframes ldRingPulse {
      0% {
        opacity: 0.8;
        transform: scale(0.9);
        border-color: rgba(33, 150, 243, 0.7);
      }

      100% {
        opacity: 0;
        transform: scale(1.6);
        border-color: rgba(33, 150, 243, 0);
      }
    }

    /* Text block */
    .ld-text {
      position: relative;
      z-index: 2;
      text-align: center;
      opacity: 0;
      animation: ldTextUp 0.8s ease 2.0s forwards;
    }

    @keyframes ldTextUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .ld-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1.5px;
      margin-bottom: 5px;
    }

    .ld-sub {
      font-size: 11px;
      color: #7B9CC8;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* MOBILE OPTIMIZATIONS */
    @media (max-width: 600px) {

      /* Reduce hero whitespace and text size */
      .hero {
        padding: 40px 1rem 48px;
      }

      .hero h1 {
        font-size: 32px;
        letter-spacing: -1px;
      }

      .hero p {
        font-size: 15px;
        margin-bottom: 24px;
      }

      /* Shrink the navigation bar height */
      .nav-inner {
        padding: 0 1rem;
        height: 56px;
      }

      .logo-circle {
        width: 32px;
        height: 32px;
        font-size: 11px;
      }

      /* Compact Grid Layouts */
      .grid-3,
      .grid-2 {
        grid-template-columns: 1fr;
        /* Stack items vertically */
        gap: 12px;
      }

      /* Reduce padding in cards and sections */
      .section {
        padding: 32px 1rem;
      }

      .cat-card-header {
        padding: 14px 16px;
      }

      .cat-card-body {
        padding: 12px 16px;
      }

      /* Optimize Tab buttons for small screens */
      .tab-btn {
        padding: 10px 14px;
        font-size: 12px;
        flex: 1;
        text-align: center;
      }

      .tab-content {
        padding: 16px;
      }

      /* Make download rows more space-efficient */
      .file-row {
        padding: 10px;
        gap: 10px;
      }

      .file-row-icon {
        width: 32px;
        height: 32px;
        font-size: 16px;
      }

      .btn-download {
        padding: 6px 12px;
        font-size: 12px;
      }

      /* Contact Cards */
      .contact-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .contact-card {
        padding: 12px 8px;
      }

      /* Loader responsiveness */
      .ld-logo.sac {
        width: 240px;
        height: 240px;
      }

      .ld-logo.ksu {
        width: 140px;
        height: 140px;
      }

      .ld-divider {
        margin: 0 12px 0 -30px;
      }
    }



    /* Progress bar */
    .ld-bar-wrap {
      position: relative;
      z-index: 2;
      width: 200px;
      height: 2px;
      background: rgba(33, 150, 243, 0.15);
      border-radius: 2px;
      margin-top: 24px;
      overflow: hidden;
      opacity: 0;
      animation: ldTextUp 0.6s ease 2.2s forwards;
    }

    .ld-bar {
      height: 100%;
      background: linear-gradient(90deg, #1565C0, #00B0FF, #1565C0);
      background-size: 200% 100%;
      border-radius: 2px;
      animation: ldBarFill 2.0s ease 2.4s forwards, ldBarShine 1.4s linear 2.4s infinite;
      width: 0%;
    }

    /* Mobile Optimization for Download Buttons */
    /* Optimized Mobile Layout for Resource Cards */
    @media (max-width: 600px) {

      /* Targets all sections: MHTCET, KEAM 2025, 2024, 2023, etc. */
      .file-row,
      .resource-card,
      .resource-item {
        display: flex !important;
        flex-direction: row !important;
        align-items: center !important;
        justify-content: space-between !important;
        padding: 10px 12px !important;
        gap: 12px !important;
        width: 100% !important;
        box-sizing: border-box !important;
      }

      /* Text Wrapper: Stops the text from pushing the button away */
      .file-row-info,
      .resource-info {
        display: flex !important;
        align-items: center !important;
        gap: 10px !important;
        flex: 1 !important;
        min-width: 0 !important;
      }

      /* File Name Fix: Adds "..." if name is too long */
      .file-row-name,
      .resource-name,
      .resource-info span {
        font-size: 13px !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
        flex: 1 !important;
      }

      /* Download Button: Guaranteed Visibility */
      .btn-download {
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        padding: 6px 14px !important;
        font-size: 11px !important;
        font-weight: 600 !important;
        text-transform: uppercase !important;
        flex-shrink: 0 !important;
        /* This prevents it from disappearing */
        white-space: nowrap !important;
        border-radius: 6px !important;
        min-width: 85px !important;
      }

      .btn-preview {
        background: rgba(33, 150, 243, 0.15) !important;
        color: var(--blue-bright) !important;
        border: 1px solid rgba(33, 150, 243, 0.4) !important;
      }

      /* Icons: Keeps them compact and prevents squishing */
      .file-row-icon,
      .resource-icon,
      .resource-card i {
        width: 30px !important;
        height: 30px !important;
        min-width: 30px !important;
        flex-shrink: 0 !important;
        font-size: 14px !important;
      }

      /* General Grid/Hero fixes */
      .hero h1 {
        font-size: 26px !important;
      }

      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr !important;
        gap: 15px !important;
      }

      .section {
        padding: 30px 15px !important;
      }
    }

    @keyframes ldBarFill {
      to {
        width: 100%;
      }
    }

    @keyframes ldBarShine {

      0%,
      100% {
        background-position: 0% 0;
      }

      50% {
        background-position: 100% 0;
      }
    }
  </style>

</head>
